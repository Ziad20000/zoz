<body style="background-color: #bfff00;">
    <h1 style="color: cyan;">Page 2 - Contact Form</h1>
    <div style="border: 2px solid green; padding: 20px; margin: 10px;">
        <h2>Leave us a message:</h2>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" cols="30" placeholder="Enter your message"></textarea><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </form>
    </div>
